  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

97a;\">Packets<\u002Fa>\n    <a href=\"#bundles\" style=\"font-size: 12px; color: #7a7a6a; text-decoration: none; transition: color 0.2s;\" style-hover=\"color: #e8c97a;\">Bundles<\u002Fa>\n    <a href=\"#faq\" style=\"font-size: 12px; color: #7a7a6a; text-decoration: none; transition: color 0.2s;\" style-hover=\"color: #e8c97a;\">FAQ<\u002Fa>\n    <a href=\"#\" style=\"font-size: 12px; color: #7a7a6a; text-decoration: none; transition: color 0.2s;\" style-hover=\"color: #e8c97a;\">Privacy<\u002Fa>\n    <a href=\"#\" style=\"font-size: 12px; color: #7a7a6a; text-decoration: none; transition: color 0.2s;\" style-hover=\"color: #e8c97a;\">Terms<\u002Fa>\n    <a href=\"#\" style=\"font-size: 12px; color: #7a7a6a; text-decoration: none; transition: color 0.2s;\" style-hover=\"color: #e8c97a;\">Contact<\u002Fa>\n  <\u002Fdiv>\n  <div style=\"font-size: 11px; color: #2a2a20;\">© 2026 QuantPrep. All rights reserved.<\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showPromo&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Layout&quot;},&quot;mathTexture&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;rich&quot;,&quot;subtle&quot;,&quot;off&quot;],&quot;default&quot;:&quot;off&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Hero&quot;},&quot;revealAnimations&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;}}\">\nclass Component extends DCLogic {\n  state = { tab: 'sat', openFaq: -1 };\n\n  componentDidMount() {\n    this.progressEl = null;\n    this.onScroll = () => {\n      if (!this.progressEl) return;\n      const h = document.documentElement;\n      const max = h.scrollHeight - h.clientHeight;\n      const pct = max > 0 ? (h.scrollTop / max) * 100 : 0;\n      this.progressEl.style.width = pct + '%';\n    };\n    window.addEventListener('scroll', this.onScroll, { passive: true });\n\n    // Keep nav offset in sync with the promo banner's actual height (it can wrap at narrow widths)\n    this.syncNav = () => {\n      const banner = document.querySelector('[data-promo-banner]');\n      const nav = document.querySelector('[data-main-nav]');\n      if (nav) nav.style.top = banner ? banner.offsetHeight + 'px' : '0px';\n    };\n    this.syncNav();\n    window.addEventListener('resize', this.syncNav);\n    this.navSyncTimer = setInterval(this.syncNav, 500);\n\n    // Scroll-reveal: hide below-fold [data-reveal] elements, reveal on intersect\n    if (this.props.revealAnimations ?? true) {\n      setTimeout(() => {\n        const els = document.querySelectorAll('[data-reveal]');\n        const io = new IntersectionObserver((entries) => {\n          entries.forEach(e => {\n            if (e.isIntersecting) {\n              e.target.style.opacity = '1';\n              e.target.style.transform = 'translateY(0)';\n              io.unobserve(e.target);\n            }\n          });\n        }, { threshold: 0.12 });\n        els.forEach(el => {\n          const r = el.getBoundingClientRect();\n          if (r.top > window.innerHeight) {\n            el.style.opacity = '0';\n            el.style.transform = 'translateY(26px)';\n            el.style.transition = 'opacity 0.7s ease, transform 0.7s ease';\n            io.observe(el);\n          }\n        });\n        this.io = io;\n      }, 100);\n    }\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this.onScroll);\n    window.removeEventListener('resize', this.syncNav);\n    if (this.navSyncTimer) clearInterval(this.navSyncTimer);\n    if (this.io) this.io.disconnect();\n  }\n\n  buy(id) {\n    if (id && window.Payhip) window.Payhip.Checkout.open({ product: id });\n  }\n\n  renderVals() {\n    const glyphMode = this.props.mathTexture ?? 'rich';\n    const glyphData = [\n      ['x = (−b ± √(b²−4ac)) ⁄ 2a', '6%', '18%', '-6deg', '11px', 0],\n      ['sin²θ + cos²θ = 1', '78%', '24%', '4deg', '12px', 1.2],\n      ['a² + b² = c²', '12%', '68%', '3deg', '13px', 2.1],\n      ['y = mx + b', '84%', '64%', '-4deg', '12px', 0.6],\n      ['f(x) = x² − 4x + 3', '70%', '84%', '2deg', '11px', 1.7],\n      ['slope = Δy ⁄ Δx', '20%', '86%', '-3deg', '11px', 2.6],\n      ['∫ f(x) dx', '90%', '42%', '6deg', '15px', 0.9],\n      ['√2 ≈ 1.414', '4%', '44%', '-5deg', '11px', 1.4]\n    ];\n    const count = glyphMode === 'off' ? 0 : glyphMode === 'subtle' ? 4 : 8;\n    const heroGlyphs = React.createElement('div',\n      { style: { position: 'absolute', inset: 0, pointerEvents: 'none', overflow: 'hidden' } },\n      glyphData.slice(0, count).map((g, i) => React.createElement('span', {\n        key: i,\n        style: {\n          position: 'absolute', left: g[1], top: g[2],\n          fontFamily: \"'DM Mono', monospace\", fontSize: g[4],\n          color: 'rgba(201,168,76,0.16)', letterSpacing: '0.06em',\n          whiteSpace: 'nowrap', '--rot': g[3],\n          transform: 'rotate(' + g[3] + ')',\n          animation: 'floatY ' + (7 + i) + 's ease-in-out ' + g[5] + 's infinite'\n        }\n      }, g[0]))\n    );\n\n    const tabBase = \"font-family:'DM Mono',monospace;\";\n    const tabStyle = (active) => ({\n      fontFamily: \"'DM Mono', monospace\", fontSize: '11px', letterSpacing: '0.1em',\n      textTransform: 'uppercase', padding: '9px 22px', borderRadius: '3px', cursor: 'pointer',\n      color: active ? '#e8c97a' : '#7a7a6a',\n      background: active ? '#1a2540' : 'none',\n      border: active ? '1px solid rgba(201,168,76,0.18)' : '1px solid transparent',\n      transition: 'all 0.18s'\n    });\n\n    const satPackets = [1, 2, 3].map((n, i) => ({\n      tag: 'SAT Math · Packet ' + n,\n      name: 'SAT Math Packet ' + n,\n      desc: '100 original questions across Algebra, Advanced Math, Problem Solving & Data, and Geometry. Includes full answer key and worked solutions.',\n      buy: () => this.buy(['0YanJ', 'g6q1I', '1xyDH'][i])\n    }));\n    const actPackets = [1, 2, 3].map((n, i) => ({\n      tag: 'ACT Math · Packet ' + n,\n      name: 'ACT Math Packet ' + n,\n      desc: '100 original questions across Algebra & Functions, Geometry, Statistics, and more. Includes full answer key and worked solutions.',\n      buy: () => this.buy(['VROfC', 'LNoGZ', 'q3xAZ'][i])\n    }));\n\n    const faqData = [\n      ['What format are the packets?', 'All packets are delivered as PDF files immediately after purchase. Print them, use them on a tablet, or work through them digitally. No app, no login, no subscription — just the file.'],\n      ['Which packet should my student start with?', \"Start with Packet 1 for either SAT or ACT. Each packet covers the full topic range, so you'll get a clear read on where gaps are before buying more.\"],\n      ['How does the bundle discount work?', 'Buying 3 packets together (SAT Complete or ACT Complete) drops the price from $57 to $45. The Ultimate Bundle — all 6 packets — is $79 instead of $114. No codes needed, the discount is built in.'],\n      ['How do I get my packet after purchase?', \"Your PDF is delivered instantly after checkout. You'll receive a download link by email and can access it immediately.\"],\n      ['How is this different from other available tests?', 'Official practice tests are limited — there are only a handful available and students exhaust them quickly. QuantPrep is designed as a supplement to whatever your student is already doing — tutoring, prep courses, or official tests. More targeted reps on top of existing prep is what moves the score.'],\n      ['How many questions are in each packet?', 'Every packet contains 100 questions with a full answer key and worked solutions.']\n    ];\n    const faqs = faqData.map((f, i) => {\n      const open = this.state.openFaq === i;\n      return {\n        q: f[0], a: f[1],\n        toggle: () => this.setState(s => ({ openFaq: s.openFaq === i ? -1 : i })),\n        iconStyle: { color: '#c9a84c', fontSize: '18px', flexShrink: 0, transition: 'transform 0.2s', transform: open ? 'rotate(45deg)' : 'none' },\n        aStyle: { fontSize: '14px', color: '#7a7a6a', lineHeight: 1.7, overflow: 'hidden', maxHeight: open ? '300px' : '0', paddingTop: open ? '12px' : '0', transition: 'max-height 0.3s ease, padding 0.3s' }\n      };\n    });\n\n    const showPromo = this.props.showPromo ?? true;\n\n    return {\n      showPromo,\n      navTop: showPromo ? '37px' : '0px',\n      heroGlyphs,\n      progressRef: (el) => { this.progressEl = el; },\n      showSat: () => this.setState({ tab: 'sat' }),\n      showAct: () => this.setState({ tab: 'act' }),\n      satTabStyle: tabStyle(this.state.tab === 'sat'),\n      actTabStyle: tabStyle(this.state.tab === 'act'),\n      packets: this.state.tab === 'sat' ? satPackets : actPackets,\n      faqs\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
